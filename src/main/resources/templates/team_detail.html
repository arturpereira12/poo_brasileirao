<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${team.name} + ' — Copa do Mundo 2026'">Seleção — Copa do Mundo 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #0f1b33;
            --navy-light: #1a2744;
            --gold: #c9a227;
            --gold-light: #e8c45a;
            --card-bg: rgba(30, 45, 80, 0.6);
            --border-glass: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--navy);
            color: #e8e8e8;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .navbar-brand { font-weight:800; font-size:1.3rem; color:var(--gold) !important; }
        .navbar { border-bottom:1px solid var(--border-glass); background: rgba(15, 27, 51, 0.95) !important; backdrop-filter: blur(10px); }

        .team-hero {
            background: linear-gradient(135deg, var(--navy) 0%, #0d1b35 100%);
            padding: 4rem 0;
            border-bottom: 2px solid var(--gold);
            margin-bottom: 3rem;
            position: relative;
            overflow: hidden;
        }
        .team-hero::before {
            content: th:text="${team.flagEmoji}";
            position: absolute;
            right: -5%;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20rem;
            opacity: 0.05;
        }

        .hero-flag { font-size: 6rem; margin-bottom: 1rem; }
        .hero-name { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .hero-group { font-size: 1.2rem; color: var(--gold); font-weight: 700; letter-spacing: 3px; }

        .stat-box {
            background: var(--card-bg);
            border: 1px solid var(--border-glass);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            height: 100%;
        }
        .stat-val { font-size: 2rem; font-weight: 900; color: var(--gold); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: rgba(255,255,255,0.4); letter-spacing: 1px; }

        .section-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 1.5rem; border-left: 4px solid var(--gold); padding-left: 15px; }

        .player-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-glass);
            border-radius: 10px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .player-card:hover { background: rgba(255,255,255,0.08); border-color: var(--gold); }
        .player-name { font-weight: 700; }
        .player-pos { font-size: 0.7rem; color: rgba(255,255,255,0.4); text-transform: uppercase; }
        .player-str { font-weight: 900; color: var(--gold); }

        .match-row {
            border-bottom: 1px solid var(--border-glass);
            padding: 1rem 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .match-score { font-weight: 900; font-size: 1.2rem; min-width: 60px; text-align: center; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">&#9917; Copa do Mundo 2026</a>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/groups">Grupos</a></li>
                <li class="nav-item"><a class="nav-link" href="/bracket">Chaveamento</a></li>
                <li class="nav-item"><a class="nav-link" href="/matches">Partidas</a></li>
                <li class="nav-item"><a class="nav-link" href="/stats">Estatísticas</a></li>
                <li class="nav-item"><a class="nav-link active" href="/teams">Seleções</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="team-hero">
    <div class="container text-center">
        <div class="hero-flag" th:text="${team.flagEmoji}">🏳️</div>
        <h1 class="hero-name" th:text="${team.name}">Brasil</h1>
        <div class="hero-group">GRUPO <span th:text="${team.group}">A</span></div>
    </div>
</div>

<div class="container pb-5">
    <div class="row g-4 mb-5">
        <div class="col-md-3">
            <div class="stat-box">
                <div class="stat-val" th:text="${team.fifaRanking}">1</div>
                <div class="stat-label">Ranking FIFA</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-box">
                <div class="stat-val" th:text="${team.strength}">85</div>
                <div class="stat-label">Força Geral</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-box">
                <div class="stat-val" th:text="${team.attackStrength}">85</div>
                <div class="stat-label">Ataque</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-box">
                <div class="stat-val" th:text="${team.defenseStrength}">85</div>
                <div class="stat-label">Defesa</div>
            </div>
        </div>
    </div>

    <div class="row g-5">
        <!-- PLAYERS -->
        <div class="col-lg-6">
            <h2 class="section-title">Convocados</h2>
            <div class="row g-2">
                <div class="col-12" th:each="p : ${team.players}">
                    <div class="player-card">
                        <div>
                            <div class="player-name" th:text="${p.name}">Neymar Jr</div>
                            <div class="player-pos" th:text="${p.position}">Atacante</div>
                        </div>
                        <div class="player-str" th:text="${p.strength}">91</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- MATCHES -->
        <div class="col-lg-6">
            <h2 class="section-title">Partidas no Torneio</h2>
            <div th:if="${matches.isEmpty()}" class="text-muted">Ainda não disputou partidas.</div>
            <div th:each="m : ${matches}" class="match-row">
                <div class="text-end flex-grow-1">
                    <span th:text="${m.homeTeam.name}">Time A</span>
                    <span th:text="${m.homeTeam.flagEmoji}">🏳️</span>
                </div>
                <div class="match-score" th:text="${m.played ? m.homeScore + ' - ' + m.awayScore : 'vs'}">0 - 0</div>
                <div class="text-start flex-grow-1">
                    <span th:text="${m.awayTeam.flagEmoji}">🏳️</span>
                    <span th:text="${m.awayTeam.name}">Time B</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
