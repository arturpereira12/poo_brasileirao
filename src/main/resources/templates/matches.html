<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partidas — Copa do Mundo 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #0f1b33;
            --navy-light: #1a2744;
            --gold: #c9a227;
            --gold-light: #e8c45a;
            --card-bg: rgba(30, 45, 80, 0.6);
            --border-glass: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--navy);
            color: #e8e8e8;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .navbar-brand { font-weight:800; font-size:1.3rem; color:var(--gold) !important; }
        .navbar { border-bottom:1px solid var(--border-glass); background: rgba(15, 27, 51, 0.95) !important; backdrop-filter: blur(10px); }

        .page-header {
            padding: 3rem 0;
            border-bottom: 2px solid var(--gold);
            margin-bottom: 2rem;
            background: linear-gradient(180deg, rgba(201,162,39,0.05) 0%, transparent 100%);
        }

        .filter-bar {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .match-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 15px;
            margin-bottom: 1rem;
            transition: all 0.3s;
            overflow: hidden;
        }
        .match-card:hover { border-color: var(--gold); transform: scale(1.01); }

        .match-header {
            background: rgba(0,0,0,0.2);
            padding: 0.5rem 1.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gold);
            display: flex;
            justify-content: space-between;
        }

        .match-body {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }

        .team-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .team-box.home { justify-content: flex-end; }
        .team-box.away { justify-content: flex-start; }

        .team-name { font-size: 1.2rem; font-weight: 700; }
        .team-flag { font-size: 2rem; }

        .score-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--gold);
            padding: 0.5rem 1.5rem;
            border-radius: 10px;
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            min-width: 120px;
            text-align: center;
        }
        .vs-text { font-size: 1rem; color: var(--gold); }

        .scorers-box {
            background: rgba(0,0,0,0.1);
            padding: 0.8rem 1.5rem;
            font-size: 0.8rem;
            border-top: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.6);
        }
        .scorers-list { flex: 1; }
        .scorers-list.home { text-align: right; margin-right: 2rem; }
        .scorers-list.away { text-align: left; margin-left: 2rem; }

        .nav-pills .nav-link { color: #ccc; font-weight: 600; border-radius: 50px; padding: 0.5rem 1.5rem; }
        .nav-pills .nav-link.active { background-color: var(--gold); color: var(--navy); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">&#9917; Copa do Mundo 2026</a>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/groups">Grupos</a></li>
                <li class="nav-item"><a class="nav-link" href="/bracket">Chaveamento</a></li>
                <li class="nav-item"><a class="nav-link active" href="/matches">Partidas</a></li>
                <li class="nav-item"><a class="nav-link" href="/stats">Estatísticas</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="page-header text-center">
    <div class="container">
        <h1 class="fw-bold mb-0" style="font-size:3rem;">PARTIDAS</h1>
        <p class="text-gold text-uppercase tracking-widest fw-bold">FIFA World Cup 2026</p>
    </div>
</div>

<div class="container pb-5">
    
    <div class="filter-bar">
        <form action="/matches" method="get" class="row g-3 align-items-center">
            <div class="col-auto">
                <ul class="nav nav-pills">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${selectedPhase == 'GROUP' ? 'active' : ''}" href="/matches?phase=GROUP">Fase de Grupos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${selectedPhase == 'R32' ? 'active' : ''}" href="/matches?phase=R32">R32</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${selectedPhase == 'R16' ? 'active' : ''}" href="/matches?phase=R16">Oitavas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${selectedPhase == 'QF' ? 'active' : ''}" href="/matches?phase=QF">Quartas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${selectedPhase == 'SF' ? 'active' : ''}" href="/matches?phase=SF">Semis</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${selectedPhase == 'FINAL' ? 'active' : ''}" href="/matches?phase=FINAL">Final</a>
                    </li>
                </ul>
            </div>
            
            <div class="col-auto ms-auto" th:if="${selectedPhase == 'GROUP'}">
                <div class="btn-group">
                    <a th:each="d : ${groupDays}" 
                       th:href="'/matches?phase=GROUP&day=' + ${d}" 
                       class="btn btn-outline-warning btn-sm" 
                       th:classappend="${selectedDay == d ? 'active' : ''}" 
                       th:text="'Rodada ' + ${d}">Rodada 1</a>
                </div>
            </div>
        </form>
    </div>

    <div class="matches-list">
        <div th:each="m : ${matches}" class="match-card">
            <div class="match-header">
                <span th:text="${m.knockout ? m.knockoutRound.displayName : 'Grupo ' + m.groupName}">Fase</span>
                <span th:if="${m.matchNumber > 0}" th:text="'Match #' + ${m.matchNumber}">#</span>
                <span th:if="${!m.knockout}" th:text="'Rodada ' + ${m.round}">Rodada 1</span>
            </div>
            
            <div class="match-body">
                <div class="team-box home">
                    <span class="team-name" th:text="${m.homeTeam.name}">Brasil</span>
                    <span class="team-flag" th:text="${m.homeTeam.flagEmoji}">🇧🇷</span>
                </div>
                
                <div class="score-box">
                    <span th:if="${m.played}" th:text="${m.homeScore + ' - ' + m.awayScore}">0 - 0</span>
                    <span th:if="${!m.played}" class="vs-text">VS</span>
                </div>
                
                <div class="team-box away">
                    <span class="team-flag" th:text="${m.awayTeam.flagEmoji}">🇫🇷</span>
                    <span class="team-name" th:text="${m.awayTeam.name}">França</span>
                </div>
            </div>

            <div class="scorers-box" th:if="${m.played}">
                <div class="scorers-list home">
                    <span th:each="s, iter : ${m.getGoalScorers(m.homeTeam.name)}">
                        <span th:text="${s}"></span><span th:if="${!iter.last}">, </span>
                    </span>
                </div>
                <div class="text-warning small mx-3"><i class="fas fa-futbol"></i></div>
                <div class="scorers-list away">
                    <span th:each="s, iter : ${m.getGoalScorers(m.awayTeam.name)}">
                        <span th:text="${s}"></span><span th:if="${!iter.last}">, </span>
                    </span>
                </div>
            </div>
        </div>
        
        <div th:if="${matches == null || matches.isEmpty()}" class="text-center py-5">
            <p class="text-muted">Nenhuma partida encontrada para este filtro.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
