<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleções — Copa do Mundo 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #0f1b33;
            --navy-light: #1a2744;
            --gold: #c9a227;
            --gold-light: #e8c45a;
            --card-bg: rgba(30, 45, 80, 0.6);
            --border-glass: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--navy);
            color: #e8e8e8;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .navbar-brand { font-weight:800; font-size:1.3rem; color:var(--gold) !important; }
        .navbar { border-bottom:1px solid var(--border-glass); background: rgba(15, 27, 51, 0.95) !important; backdrop-filter: blur(10px); }

        .page-header {
            background: linear-gradient(135deg, var(--navy) 0%, #0d1b35 100%);
            border-bottom: 2px solid var(--gold);
            padding: 3rem 0;
            margin-bottom: 2rem;
        }
        .page-title { font-size: 2.5rem; font-weight: 900; color: #fff; text-transform: uppercase; }
        .page-title span { color: var(--gold); }

        .group-section { margin-bottom: 3rem; }
        .group-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .group-title::after { content: ''; flex: 1; height: 1px; background: var(--border-glass); }

        .team-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 15px;
            padding: 1.5rem;
            height: 100%;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .team-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            color: #fff;
        }

        .team-flag { font-size: 3.5rem; margin-bottom: 1rem; }
        .team-name { font-size: 1.2rem; font-weight: 800; margin-bottom: 0.5rem; }
        .team-meta { font-size: 0.75rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }
        
        .strength-badge {
            background: rgba(201,162,39,0.2);
            color: var(--gold);
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">&#9917; Copa do Mundo 2026</a>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/groups">Grupos</a></li>
                <li class="nav-item"><a class="nav-link" href="/bracket">Chaveamento</a></li>
                <li class="nav-item"><a class="nav-link" href="/matches">Partidas</a></li>
                <li class="nav-item"><a class="nav-link" href="/stats">Estatísticas</a></li>
                <li class="nav-item"><a class="nav-link active" href="/teams">Seleções</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="page-header">
    <div class="container text-center">
        <h1 class="page-title">As <span>48 Seleções</span></h1>
        <p class="text-muted mb-0">Participantes da Copa do Mundo FIFA 2026</p>
    </div>
</div>

<div class="container pb-5">
    <div th:each="entry : ${groupedByGroup}" class="group-section">
        <h2 class="group-title">GRUPO <span th:text="${entry.key}">A</span></h2>
        <div class="row g-4">
            <div class="col-6 col-md-4 col-lg-3" th:each="team : ${entry.value}">
                <a th:href="@{'/teams/' + ${team.countryCode}}" class="team-card">
                    <div class="team-flag" th:text="${team.flagEmoji}">🏳️</div>
                    <div class="team-name" th:text="${team.name}">Brasil</div>
                    <div class="team-meta">Ranking FIFA: #<span th:text="${team.fifaRanking}">1</span></div>
                    <div class="strength-badge"><i class="fas fa-bolt me-1"></i>Força: <span th:text="${team.strength}">85</span></div>
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
